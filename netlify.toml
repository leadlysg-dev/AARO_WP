# ============================================================
# netlify.toml — Netlify site configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/
# ============================================================

[build]
  # No build step needed — this is plain static HTML.
  # Publish from the repo root (where index.html sits).
  publish = "."

# ------------------------------------------------------------
# Pretty URLs are ON by default in Netlify, so /about will
# resolve to /about.html automatically. Internal links in this
# project still use .html, which works fine — Netlify serves both.
# ------------------------------------------------------------

# Security headers applied to every page
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "geolocation=(), microphone=(), camera=()"

# Cache CSS / JS for 5 minutes only, with must-revalidate. We're still iterating
# the design — once the site is stable, bump this back to 3600 (1 hour).
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/scripts.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Images — must-revalidate during iteration so updates land immediately.
# Once the site is stable, change to a long max-age and use filename hashing.
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Long-cache static assets — once you add real images here, they
# can be cached aggressively because filenames are content-addressed.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
